name: Super Ultra Typescript Deploy

on:

  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: both

      mode:
        required: false
        type: string
        default: production

  workflow_dispatch:

  push:
    branches: [main]

  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

env:
  NODE_VERSION: 20
  DIST_DIR: dist
  BUNDLE_LIMIT_KB: 5000

concurrency:
  group: super-ultra-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript strict
        run: npx tsc --noEmit --strict

      - name: ESLint strict
        run: npx eslint . --max-warnings=0

      - name: Build
        run: npm run build

      - name: Verify dist
        run: |
          if [ ! -d "${{ env.DIST_DIR }}" ]; then
            echo "dist folder missing"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  bundle-analysis:

    needs: build
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Bundle size check
        run: |
          SIZE=$(du -sk dist | cut -f1)

          echo "Bundle size: $SIZE KB"

          if [ "$SIZE" -gt "${{ env.BUNDLE_LIMIT_KB }}" ]; then
            echo "Bundle too large"
            exit 1
          fi

      - name: File analysis
        run: |
          find dist -type f -name "*.js" -exec du -h {} \;

  netlify-preview:

    if: ${{ inputs.target == 'both' || inputs.target == 'netlify' }}

    needs: bundle-analysis
    runs-on: ubuntu-latest

    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - run: npm install -g netlify-cli jq

      - id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          RESP=$(netlify deploy \
            --dir=dist \
            --json \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID)

          URL=$(echo $RESP | jq -r '.deploy_url')

          echo "url=$URL" >> $GITHUB_OUTPUT

  github-pages:

    if: ${{ inputs.target == 'both' || inputs.target == 'github-pages' }}

    needs: bundle-analysis
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4

  lighthouse:

    needs: [netlify-preview]
    runs-on: ubuntu-latest

    steps:

      - run: npm install -g lighthouse jq

      - name: Run Lighthouse
        run: |

          URL="${{ needs.netlify-preview.outputs.preview_url }}"

          lighthouse $URL \
            --chrome-flags="--headless" \
            --output=json \
            --output-path=report.json

      - name: Extract score
        id: score
        run: |
          SCORE=$(jq '.categories.performance.score*100|floor' report.json)

          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: lighthouse
          path: report.json

  pr-comment:

    if: github.event_name == 'pull_request'

    needs: [netlify-preview, lighthouse]

    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: lighthouse

      - id: score
        run: |
          SCORE=$(jq '.categories.performance.score*100|floor' report.json)

          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - uses: actions/github-script@v7
        with:
          script: |

            const score = "${{ steps.score.outputs.score }}"
            const url = "${{ needs.netlify-preview.outputs.preview_url }}"

            const body = `
🚀 Preview Ready

🔗 ${url}

⚡ Lighthouse Score: ${score}

If performance drops below 80 CI will fail.
`

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
