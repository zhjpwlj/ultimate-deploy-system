name: "🚀 Super Ultra Typescript Deploy"
description: "Ultimate TypeScript CI/CD with Lighthouse audits, bundle guard, and Netlify or GitHub Pages deployment."
author: "zhjpwlj"

branding:
  icon: zap
  color: green

inputs:
  target:
    description: "Deploy target (both | github-pages | netlify)"
    required: false
    default: "github-pages"

  mode:
    description: "Deployment mode (preview | production)"
    required: false
    default: "production"

runs:
  using: "composite"

  steps:
    - name: Info
      run: |
        echo "🚀 Super Ultra Typescript Deploy"
        echo "Use the reusable workflow:"
        echo "uses: zhjpwlj/ultimate-deploy-system/.github/workflows/workflow.yml@v2.0.0"
      shell: bash
